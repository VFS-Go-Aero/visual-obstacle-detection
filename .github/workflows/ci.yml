name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy --ignore-missing-imports obstacle_detection.py

  # For deployment to ZED Box Mini (Jetson Orin Nano)
  # Requires a self-hosted runner on the device with labels: [self-hosted, linux, arm64, jetson]
  # JetPack 6.x is based on Ubuntu 22.04
  deploy:
    name: Deploy to ZED Box Mini
    runs-on: [self-hosted, linux, arm64, jetson]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify ZED SDK
        run: |
          uv run python -c "import pyzed.sl as sl; print(f'ZED SDK Version: {sl.Camera().get_sdk_version()}')"

      - name: Deploy application
        run: |
          mkdir -p ~/obstacle-detection
          cp obstacle_detection.py ~/obstacle-detection/
          cp pyproject.toml ~/obstacle-detection/
          echo "Deployed to ~/obstacle-detection"
